name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Stable release tag to publish, e.g. vX.Y.Z"
        required: true
        type: string
      repository:
        description: "Package index target"
        required: true
        default: "pypi"
        type: choice
        options:
          - pypi
          - testpypi
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Published GitHub releases always go to PyPI; skip pre-releases.
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    environment: ${{ inputs.repository || 'pypi' }}
    env:
      # release event -> use the release tag and target PyPI; otherwise use the dispatch inputs
      REF: ${{ github.event.release.tag_name || inputs.ref }}
      REPOSITORY: ${{ inputs.repository || 'pypi' }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.tag_name || inputs.ref }}
          fetch-depth: 0

      - name: Ref must be a stable release tag
        run: |
          if [[ ! "$REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "PyPI publishing is only allowed from stable tags like v0.2.0, not '$REF'."
            exit 1
          fi

          checked_out_tag="$(git describe --exact-match --tags HEAD)"
          if [[ "$checked_out_tag" != "$REF" ]]; then
            echo "Checked out '$checked_out_tag', expected '$REF'."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to TestPyPI
        if: ${{ env.REPOSITORY == 'testpypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: ${{ env.REPOSITORY == 'pypi' }}
        uses: pypa/gh-action-pypi-publish@release/v1
