name: Trigger src dev release

# Fires the Nightly Dev Release workflow in gemc/src whenever main is pushed.
# Requires a repository secret named GEMC_SRC_PAT that holds a GitHub Personal
# Access Token with the `workflow` scope granted on the gemc/src repository.

on:
  push:
    branches: ["main"]

jobs:
  trigger-dev-release:
    name: Dispatch dev_release.yml in gemc/src
    runs-on: ubuntu-latest

    steps:
      - name: Trigger workflow_dispatch on gemc/src
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GEMC_SRC_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gemc/src/actions/workflows/dev_release.yml/dispatches \
            -d '{"ref":"main"}'
