name: Trigger src docker deploy and test

# Fires the Deploy and Test workflow in gemc/src whenever main is pushed.
# Requires a repository secret named GEMC_SRC_PAT that holds a GitHub Personal
# Access Token with the `workflow` scope granted on the gemc/src repository.

on:
  push:
    branches: ["main"]

jobs:
  trigger-docker-deploy:
    name: Dispatch dockers_deploy_and_test.yml in gemc/src
    runs-on: ubuntu-latest

    steps:
      - name: Trigger workflow_dispatch on gemc/src
        run: |
          curl --fail-with-body -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GEMC_SRC_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/gemc/src/actions/workflows/dockers_deploy_and_test.yml/dispatches \
            -d '{"ref":"main"}'
